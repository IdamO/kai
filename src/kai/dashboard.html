<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAI</title>
<style>
/* ============================================================
   DESIGN SYSTEM
   3-color (black/bone/red), phi spacing, monospace, vertical nav
   ============================================================ */
:root {
  --black: #0A0A0A;
  --bone: #E8E4DD;
  --red: #FF2D20;
  --bone-60: rgba(232, 228, 221, 0.60);
  --bone-30: rgba(232, 228, 221, 0.30);
  --bone-12: rgba(232, 228, 221, 0.12);
  --bone-06: rgba(232, 228, 221, 0.06);
  --bone-03: rgba(232, 228, 221, 0.03);
  --red-20: rgba(255, 45, 32, 0.20);
  --c-tool: #FFB347;
  --c-text: #E8E4DD;
  --c-think: #9B8FE8;
  --c-result: #6BC88C;
  --c-error: #FF2D20;
  --c-system: #5BA3CF;
  --phi1: 5px; --phi2: 8px; --phi3: 13px; --phi4: 21px;
  --phi5: 34px; --phi6: 55px; --phi7: 89px;
  --ease-out: cubic-bezier(0.19, 1, 0.22, 1);
  --ease-std: cubic-bezier(.4, 0, .2, 1);
  --dur-fast: 150ms; --dur-base: 300ms; --dur-slow: 500ms;
  --mono: 'SF Mono', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  background: var(--black); color: var(--bone); font-family: var(--mono);
  font-size: 13px; line-height: 1.5; height: 100%; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Vertical line texture */
body::before {
  content: ''; position: fixed; top: 0; left: 0; bottom: 0; width: 55px;
  background: repeating-linear-gradient(90deg, var(--bone-06) 0px, var(--bone-06) 1px, transparent 1px, transparent 3px);
  z-index: 100; pointer-events: none;
}

/* Layout */
.shell { display: flex; height: 100%; }

/* Nav */
nav {
  width: 55px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; padding: var(--phi4) 0; position: relative; z-index: 101;
}
nav .logo-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: var(--phi5); gap: var(--phi2);
}
nav .logo {
  font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--bone); writing-mode: vertical-rl; text-orientation: mixed;
  cursor: default; transition: color var(--dur-base) var(--ease-std);
}
nav .logo.active { color: var(--red); }
nav .status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #484f58;
  transition: background var(--dur-base), box-shadow var(--dur-base);
}
nav .status-dot.idle { background: var(--c-result); }
nav .status-dot.responding {
  background: var(--c-think);
  animation: pulse-glow 2s infinite;
}
nav .status-dot.down { background: var(--red); }
nav .nav-items {
  display: flex; flex-direction: column; align-items: center;
  gap: var(--phi4); flex: 1;
}
nav .nav-item {
  writing-mode: vertical-rl; text-orientation: mixed; font-size: 9px;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--bone-30);
  cursor: pointer; transition: color var(--dur-fast); border: none;
  background: none; font-family: inherit; padding: 0; white-space: nowrap;
}
nav .nav-item:hover { color: var(--bone-60); }
nav .nav-item.active { color: var(--bone); }

@keyframes pulse-glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--red-20); }
  50% { opacity: 0.6; box-shadow: 0 0 0 8px transparent; }
}

/* Main */
main {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
  border-left: 1px solid var(--bone-06);
}
.topbar {
  display: flex; align-items: baseline; padding: var(--phi3) var(--phi4);
  border-bottom: 1px solid var(--bone-06); flex-shrink: 0; gap: var(--phi5);
}
.topbar .view-title {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--bone-60);
}
.topbar .meta { font-size: 10px; color: var(--bone-30); margin-left: auto; }
.topbar .meta .val { color: var(--bone-60); }

/* Views */
.views { flex: 1; overflow: hidden; position: relative; }
.view {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  opacity: 0; visibility: hidden;
  transition: opacity var(--dur-slow) var(--ease-out), visibility 0s var(--dur-slow);
  padding: var(--phi4);
}
.view.active {
  opacity: 1; visibility: visible;
  transition: opacity var(--dur-slow) var(--ease-out), visibility 0s 0s;
}
.view.active > * {
  animation: stagger-in 800ms var(--ease-out) both;
}
.view.active > *:nth-child(1) { animation-delay: 0ms; }
.view.active > *:nth-child(2) { animation-delay: 60ms; }
.view.active > *:nth-child(3) { animation-delay: 120ms; }
.view.active > *:nth-child(4) { animation-delay: 180ms; }
.view.active > *:nth-child(5) { animation-delay: 240ms; }
.view.active > *:nth-child(6) { animation-delay: 300ms; }
.view.active > *:nth-child(7) { animation-delay: 360ms; }
.view.active > *:nth-child(8) { animation-delay: 420ms; }
@keyframes stagger-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   OVERVIEW
   ============================================================ */
.ov-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  height: 100%; background: var(--bone-06);
}
.ov-grid > * { background: var(--black); padding: var(--phi4); }

.ov-stats {
  grid-column: 1 / -1; display: flex; gap: 1px;
  background: var(--bone-06); padding: 0 !important;
}
.ov-stats > .stat {
  background: var(--black); flex: 1; padding: var(--phi2) var(--phi4);
}
.stat .label {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--bone-30); margin-bottom: 2px;
}
.stat .number {
  font-size: 28px; font-weight: 200; line-height: 1; color: var(--bone);
  font-variant-numeric: tabular-nums;
}
.stat .number.red { color: var(--red); }
.stat .sub { font-size: 10px; color: var(--bone-30); margin-top: 2px; }

/* Focus/action panel */
.ov-panel { display: flex; flex-direction: column; overflow: hidden; }
.ov-panel .panel-title {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--bone-30); margin-bottom: var(--phi3);
}
.ov-panel .panel-list { list-style: none; overflow-y: auto; flex: 1; }
.ov-panel .panel-list li {
  padding: var(--phi2) 0; border-bottom: 1px solid var(--bone-06);
  font-size: 11px; color: var(--bone-60); line-height: 1.4;
}
.ov-panel .panel-list li:last-child { border-bottom: none; }
.ov-panel .panel-list .name { color: var(--bone); font-weight: 600; }
.ov-panel .panel-list .urgent { color: var(--red); }
.ov-panel .panel-list .urgent .name { color: var(--red); }

/* Stream panel (embedded in overview + full) */
.stream-panel {
  display: flex; flex-direction: column; overflow: hidden;
  padding: 0 !important;
}
.stream-panel .panel-header {
  display: flex; align-items: center; padding: var(--phi2) var(--phi4);
  border-bottom: 1px solid var(--bone-06); flex-shrink: 0; gap: var(--phi3);
}
.stream-panel .panel-header .title {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--bone-30);
}
.stream-panel .panel-header .live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: pulse-glow 2s infinite;
}
.stream-panel .panel-header .count {
  font-size: 10px; color: var(--bone-30); margin-left: auto;
}
.stream {
  flex: 1; overflow-y: auto; padding: var(--phi2) 0;
}
.ev {
  display: flex; padding: 1px var(--phi4); font-size: 12px;
  transition: background var(--dur-fast);
}
.ev:hover { background: var(--bone-03); }
.ev .ts { color: var(--bone-12); min-width: 65px; flex-shrink: 0; }
.ev .tag {
  min-width: 50px; flex-shrink: 0; font-weight: 600; font-size: 10px;
  letter-spacing: 0.05em;
}
.ev .msg { color: var(--bone-30); word-break: break-word; flex: 1; }
.ev.tool .tag { color: var(--c-tool); }
.ev.text .tag { color: var(--c-text); }
.ev.text .msg { color: var(--bone); }
.ev.think .tag { color: var(--c-think); }
.ev.think .msg { color: var(--c-think); opacity: 0.7; font-style: italic; }
.ev.result .tag { color: var(--c-result); }
.ev.result.err .tag { color: var(--red); }
.ev.result.err .msg { color: var(--red); }
.ev.sys .tag { color: var(--c-system); }
.ev.msg-in .tag { color: var(--red); }
.ev.msg-in .msg { color: var(--bone); }
.ev.msg-in { border-left: 2px solid var(--red); }
.ev.fresh { animation: flash-in var(--dur-slow) var(--ease-out); }
@keyframes flash-in { from { background: var(--bone-06); } to { background: transparent; } }
.ev.filtered { display: none; }

/* Stream filters */
.stream-filters {
  display: flex; gap: var(--phi2); padding: var(--phi3) var(--phi4);
  border-bottom: 1px solid var(--bone-06);
}
.filter-btn {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; background: transparent; border: 1px solid var(--bone-06);
  color: var(--bone-30); padding: 2px var(--phi3); cursor: pointer;
  transition: all var(--dur-fast);
}
.filter-btn:hover { border-color: var(--bone-30); color: var(--bone-60); }
.filter-btn.active { border-color: var(--bone); color: var(--bone); }

/* ============================================================
   TASKS
   ============================================================ */
.tasks-view { padding: 0; }
.task-section { margin-bottom: var(--phi5); }
.section-label {
  font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--bone-30); margin-bottom: var(--phi3); padding: 0 var(--phi2);
}
.task-item {
  display: flex; align-items: flex-start; gap: var(--phi3);
  padding: var(--phi2); border-bottom: 1px solid var(--bone-06);
  transition: background var(--dur-fast);
}
.task-item:hover { background: var(--bone-03); }
.task-marker {
  width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--bone-30);
  flex-shrink: 0; margin-top: 3px; cursor: pointer;
  transition: all var(--dur-fast);
}
.task-marker:hover { border-color: var(--bone); }
.task-marker.done { background: var(--c-result); border-color: var(--c-result); }
.task-marker.active { background: var(--c-think); border-color: var(--c-think); }
.task-text {
  flex: 1; font-size: 12px; color: var(--bone-60); line-height: 1.4;
  outline: none; min-height: 18px;
}
.task-text[contenteditable]:focus { color: var(--bone); background: var(--bone-06); padding: 2px 4px; }
.task-item.done .task-text { text-decoration: line-through; color: var(--bone-12); }
.task-detail { font-size: 11px; color: var(--bone-12); margin-top: 2px; }
.task-del {
  font-size: 11px; color: var(--bone-12); cursor: pointer; padding: 0 4px;
  transition: color var(--dur-fast); flex-shrink: 0;
}
.task-del:hover { color: var(--red); }
.add-task {
  display: flex; gap: var(--phi2); padding: var(--phi3) var(--phi2);
}
.add-task input {
  flex: 1; background: transparent; border: 1px solid var(--bone-06);
  color: var(--bone); font-family: var(--mono); font-size: 12px;
  padding: var(--phi2) var(--phi3); outline: none;
}
.add-task input:focus { border-color: var(--bone-30); }
.add-task input::placeholder { color: var(--bone-12); }
.add-task button {
  background: transparent; border: 1px solid var(--bone-06); color: var(--bone-30);
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; padding: var(--phi2) var(--phi3); cursor: pointer;
}
.add-task button:hover { border-color: var(--bone); color: var(--bone); }

/* ============================================================
   FILES
   ============================================================ */
.files-view {
  display: grid; grid-template-columns: 250px 1fr; gap: 1px;
  height: 100%; background: var(--bone-06);
}
.files-view > * { background: var(--black); }
.file-tree { overflow-y: auto; padding: var(--phi3); }
.file-tree .breadcrumb {
  font-size: 10px; color: var(--bone-30); margin-bottom: var(--phi3);
  display: flex; gap: 4px; flex-wrap: wrap;
}
.file-tree .breadcrumb span {
  cursor: pointer; transition: color var(--dur-fast);
}
.file-tree .breadcrumb span:hover { color: var(--bone); }
.file-tree .breadcrumb span.current { color: var(--bone-60); cursor: default; }
.file-entry {
  display: flex; align-items: center; gap: var(--phi2);
  padding: 3px var(--phi2); cursor: pointer; font-size: 12px;
  color: var(--bone-60); transition: all var(--dur-fast);
}
.file-entry:hover { background: var(--bone-06); color: var(--bone); }
.file-entry.active { color: var(--bone); background: var(--bone-06); }
.file-entry .icon { font-size: 10px; color: var(--bone-30); width: 16px; text-align: center; }
.file-entry .size { font-size: 10px; color: var(--bone-12); margin-left: auto; }
.file-content {
  overflow-y: auto; padding: var(--phi4);
  white-space: pre-wrap; word-wrap: break-word; font-size: 12px;
  color: var(--bone-60); line-height: 1.6;
}
.file-content .file-header {
  font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--bone-30); margin-bottom: var(--phi3);
  padding-bottom: var(--phi2); border-bottom: 1px solid var(--bone-06);
}
.file-content .empty { color: var(--bone-12); font-style: italic; }

/* ============================================================
   JOBS / LOG / HISTORY
   ============================================================ */
.conv-list .conv-item {
  padding: var(--phi3) var(--phi2); border-bottom: 1px solid var(--bone-06);
  font-size: 12px; cursor: default;
}
.conv-item .conv-ts { font-size: 10px; color: var(--bone-12); }
.conv-item .conv-dir { font-size: 10px; color: var(--bone-30); }
.conv-item .conv-text { color: var(--bone-60); margin-top: 2px; }

.log-view { display: flex; flex-direction: column; height: 100%; }
.log-date-nav {
  display: flex; gap: var(--phi2); padding: var(--phi3) 0;
  flex-wrap: wrap; flex-shrink: 0;
}
.log-date-btn {
  font-family: var(--mono); font-size: 10px; background: transparent;
  border: 1px solid var(--bone-06); color: var(--bone-30); padding: 2px var(--phi3);
  cursor: pointer; transition: all var(--dur-fast);
}
.log-date-btn:hover { border-color: var(--bone-30); }
.log-date-btn.active { border-color: var(--bone); color: var(--bone); }
.log-entries { flex: 1; overflow-y: auto; }
.log-entry {
  padding: var(--phi3) 0; border-bottom: 1px solid var(--bone-06);
}
.log-entry .le-time { font-size: 10px; color: var(--bone-30); }
.log-entry .le-cat {
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--c-tool); margin-left: var(--phi2);
}
.log-entry .le-text { font-size: 12px; color: var(--bone-60); margin-top: 4px; line-height: 1.5; }

.jobs-list .job-item {
  display: flex; align-items: center; gap: var(--phi3);
  padding: var(--phi3) var(--phi2); border-bottom: 1px solid var(--bone-06);
  font-size: 12px;
}
.job-item .job-id { color: var(--bone-30); font-size: 10px; min-width: 30px; }
.job-item .job-name { color: var(--bone); flex: 1; }
.job-item .job-sched { color: var(--bone-30); font-size: 10px; }
.job-item .job-type { color: var(--c-tool); font-size: 10px; }

.history-search input {
  width: 100%; background: transparent; border: 1px solid var(--bone-06);
  color: var(--bone); font-family: var(--mono); font-size: 12px;
  padding: var(--phi2) var(--phi3); outline: none; margin-bottom: var(--phi3);
}
.history-search input:focus { border-color: var(--bone-30); }
.history-search input::placeholder { color: var(--bone-12); }

/* ============================================================
   MESSAGE BAR + TOAST
   ============================================================ */
.msg-bar {
  display: flex; border-top: 1px solid var(--bone-06); flex-shrink: 0;
}
.msg-bar input {
  flex: 1; background: transparent; border: none; color: var(--bone);
  font-family: var(--mono); font-size: 13px; padding: var(--phi3) var(--phi4);
  outline: none;
}
.msg-bar input::placeholder { color: var(--bone-12); }
.msg-bar button {
  background: transparent; border: none; border-left: 1px solid var(--bone-06);
  color: var(--bone-30); font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: var(--phi2) var(--phi4); cursor: pointer;
  transition: color var(--dur-fast);
}
.msg-bar button:hover { color: var(--bone); }

.toast {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: var(--bone-06); color: var(--bone-60); font-size: 11px;
  padding: var(--phi2) var(--phi4); opacity: 0;
  transition: opacity var(--dur-base); pointer-events: none; z-index: 200;
}
.toast.show { opacity: 1; }
.toast.ok { border-left: 2px solid var(--c-result); }
.toast.err { border-left: 2px solid var(--red); color: var(--red); }

.empty {
  color: var(--bone-12); font-size: 11px; padding: var(--phi5) 0;
  text-align: center; font-style: italic;
}
</style>
</head>
<body>
<div class="shell">
  <nav>
    <div class="logo-wrap">
      <div class="logo" id="logo">KAI</div>
      <div class="status-dot" id="statusDot" title="offline"></div>
    </div>
    <div class="nav-items">
      <button class="nav-item active" data-view="overview">Overview</button>
      <button class="nav-item" data-view="live">Stream</button>
      <button class="nav-item" data-view="tasks">Tasks</button>
      <button class="nav-item" data-view="files">Files</button>
      <button class="nav-item" data-view="jobs">Jobs</button>
      <button class="nav-item" data-view="log">Log</button>
      <button class="nav-item" data-view="history">History</button>
    </div>
  </nav>

  <main>
    <div class="topbar">
      <span class="view-title" id="viewTitle">Overview</span>
      <span class="meta" id="topMeta"></span>
    </div>

    <div class="views" id="viewContainer">
      <!-- OVERVIEW -->
      <div class="view active" id="v-overview">
        <div class="ov-grid">
          <div class="ov-stats" id="statRow"></div>
          <div class="ov-panel" id="ovFocus"></div>
          <div class="stream-panel">
            <div class="panel-header">
              <div class="live-dot"></div>
              <span class="title">Live</span>
              <span class="count" id="eventCount"></span>
            </div>
            <div class="stream" id="overviewStream"></div>
          </div>
        </div>
      </div>

      <!-- TASKS -->
      <div class="view" id="v-tasks">
        <div id="tasksContent" class="tasks-view"></div>
      </div>

      <!-- FILES -->
      <div class="view" id="v-files">
        <div class="files-view">
          <div class="file-tree" id="fileTree"></div>
          <div class="file-content" id="fileContent">
            <div class="empty">select a file to view</div>
          </div>
        </div>
      </div>

      <!-- STREAM -->
      <div class="view" id="v-live">
        <div class="stream-filters" id="streamFilters">
          <button class="filter-btn active" data-filter="all">ALL</button>
          <button class="filter-btn" data-filter="text">TEXT</button>
          <button class="filter-btn" data-filter="tool">TOOL</button>
          <button class="filter-btn" data-filter="think">THINK</button>
          <button class="filter-btn" data-filter="msg-in">IDAM</button>
          <button class="filter-btn" data-filter="sys">SYS</button>
        </div>
        <div class="stream" id="fullStream" style="flex:1;padding:0"></div>
      </div>

      <!-- JOBS -->
      <div class="view" id="v-jobs">
        <div id="jobsContent" class="jobs-list"></div>
      </div>

      <!-- LOG -->
      <div class="view" id="v-log">
        <div class="log-view">
          <div class="log-date-nav" id="logDates"></div>
          <div class="log-entries" id="logContent"></div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="view" id="v-history">
        <div class="history-search">
          <input type="text" id="historySearch" placeholder="search conversations...">
        </div>
        <div id="historyContent" class="conv-list"></div>
      </div>
    </div>

    <div class="msg-bar">
      <input type="text" id="msgInput" placeholder="send message to kai...">
      <button id="msgSend">SEND</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   STATE + REFS
   ============================================================ */
const S = { view: 'overview', events: [] };
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
const logo = $('#logo');
const statusDot = $('#statusDot');
const topMeta = $('#topMeta');
const statRow = $('#statRow');
const overviewStream = $('#overviewStream');
const fullStream = $('#fullStream');
const eventCount = $('#eventCount');
const msgInput = $('#msgInput');
const toast = $('#toast');

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg, type = 'ok') {
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.className = 'toast', 2000);
}

/* ============================================================
   NAV
   ============================================================ */
$$('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.view;
    if (v === S.view) return;
    $$('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $$('.view').forEach(el => el.classList.remove('active'));
    $(`#v-${v}`).classList.add('active');
    $('#viewTitle').textContent = btn.textContent;
    S.view = v;
    loadView(v);
  });
});

/* ============================================================
   EVENT RENDERING
   ============================================================ */
const TYPE_MAP = {tool:'tool', tool_use:'tool', tool_result:'result', text:'text', think:'think', thinking:'think', result:'result', error:'sys', system:'sys', raw:'sys', mid_stream:'msg-in', rate_limit_event:'sys'};
const TAG_MAP = {tool:'TOOL', text:'TEXT', think:'THINK', result:'RES', sys:'SYS', 'msg-in':'IDAM'};

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function evType(raw) { return TYPE_MAP[raw] || 'sys'; }

function renderEvent(ev) {
  const d = document.createElement('div');
  const raw = ev.type || 'system';
  const data = ev.data || {};
  const type = evType(raw);
  d.className = `ev ${type} fresh`;

  const ts = ev.ts ? new Date(ev.ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) : '';
  const tag = (TAG_MAP[type] || 'SYS').padEnd(6);

  let msg = '';
  if (raw === 'tool_use' || raw === 'tool') {
    msg = data.tool || '';
    const input = data.input || {};
    const desc = input.description || input.command || input.file_path || input.pattern || '';
    if (desc) msg += ' \u2014 ' + (typeof desc === 'string' ? desc : JSON.stringify(desc));
  } else if (raw === 'tool_result') {
    if (data.is_error) { msg = data.output || 'ERROR'; d.classList.add('err'); }
    else { msg = data.output || '(ok)'; }
  } else if (raw === 'result') {
    if (data.is_error) msg = 'ERROR';
    else {
      let parts = [];
      if (data.duration_ms) parts.push((data.duration_ms/1000).toFixed(1) + 's');
      if (data.cost) parts.push('$' + data.cost.toFixed(4));
      msg = parts.length ? 'done (' + parts.join(', ') + ')' : 'done';
    }
  } else if (raw === 'thinking') {
    msg = data.thinking || '';
  } else if (raw === 'text') {
    msg = data.text || '';
  } else if (raw === 'mid_stream') {
    msg = '[Idam] ' + (data.text || '');
  } else if (raw === 'raw') {
    // Skip rate_limit_event and empty user turns
    if (data.type === 'rate_limit_event') { msg = 'rate limit'; }
    else if (data.type === 'user' && data.preview) {
      const m = (data.preview || '').match(/"text":\s*"([\s\S]*?)(?:"\s*[,}])/);
      if (m) { msg = m[1].replace(/\\n/g, '\n').replace(/\\t/g, '\t'); d.className = `ev result fresh`; }
      else { msg = data.preview || '(user turn)'; }
    } else {
      msg = data.type || data.preview || '';
    }
  } else if (raw === 'system') {
    const sid = (data.session_id || '').slice(0, 8);
    msg = sid ? 'session ' + sid : '';
  } else {
    msg = typeof data === 'string' ? data : '';
  }

  d.innerHTML = `<span class="ts">${ts}</span><span class="tag">${tag}</span><span class="msg">${esc(msg)}</span>`;
  setTimeout(() => d.classList.remove('fresh'), 600);
  return d;
}

let activeFilters = new Set();
function isFiltered(type) { return activeFilters.size > 0 && !activeFilters.has(type); }

function appendEvent(ev) {
  S.events.push(ev);
  const el = renderEvent(ev);
  if (!el) return;
  const type = evType(ev.type || 'system');
  if (isFiltered(type)) el.classList.add('filtered');

  overviewStream.prepend(el.cloneNode(true));
  while (overviewStream.children.length > 100) overviewStream.lastChild.remove();

  fullStream.prepend(el);

  [overviewStream, fullStream].forEach(s => {
    if (s.scrollTop < 80) s.scrollTop = 0;
  });

  logo.classList.add('active');
  clearTimeout(logo._t);
  logo._t = setTimeout(() => logo.classList.remove('active'), 1500);

  eventCount.textContent = S.events.length + ' events';
}

/* ============================================================
   SSE
   ============================================================ */
function connectSSE() {
  if (S.eventSource) S.eventSource.close();
  const es = new EventSource('/events');
  S.eventSource = es;
  es.onopen = () => { S.connected = true; };
  es.onmessage = (e) => { try { appendEvent(JSON.parse(e.data)); } catch {} };
  es.onerror = () => { S.connected = false; setTimeout(connectSSE, 3000); };
}

/* ============================================================
   API
   ============================================================ */
async function api(path, opts) {
  try {
    const r = await fetch(path, opts);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function sendToKai(msg) {
  const r = await api('/api/message', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text: msg}),
  });
  if (r && r.status === 'sent') {
    showToast('sent to kai', 'ok');
  } else {
    showToast('failed to send', 'err');
  }
  return r;
}

/* ============================================================
   HEALTH + STATUS DOT
   ============================================================ */
async function loadHealth() {
  const h = await api('/api/health');
  if (!h) return;
  S.health = h;

  // Status dot
  if (h.claude_responding) {
    statusDot.className = 'status-dot responding';
    statusDot.title = 'responding';
  } else if (h.claude_pid || h.kai_pid) {
    statusDot.className = 'status-dot idle';
    statusDot.title = 'idle';
  } else {
    statusDot.className = 'status-dot down';
    statusDot.title = 'down';
  }

  // Topbar meta
  let meta = '';
  if (h.kai_pid) meta += `PID ${h.kai_pid}`;
  if (h.kai_uptime) meta += ` <span class="val">${h.kai_uptime}</span>`;
  if (h.claude_responding) meta += ` <span class="val" style="color:var(--c-think)">RESPONDING</span>`;
  else if (h.kai_pid) meta += ` <span class="val" style="color:var(--c-result)">IDLE</span>`;
  topMeta.innerHTML = meta;

  // Stats row
  const kaiMem = h.kai_rss_kb ? Math.round(h.kai_rss_kb / 1024) + 'MB' : '--';
  const stats = [
    { label: 'Uptime', value: h.kai_uptime || '--' },
    { label: 'Memory', value: kaiMem },
    { label: 'Claude', value: h.claude_pid ? 'PID ' + h.claude_pid : h.kai_pid ? 'standby' : 'offline' },
    { label: 'Disk', value: h.disk_pct || '--' },
    { label: 'Events', value: S.events.length },
  ];
  statRow.innerHTML = stats.map(s =>
    `<div class="stat"><div class="label">${s.label}</div><div class="number">${s.value}</div></div>`
  ).join('');
}

/* ============================================================
   OVERVIEW - focus + action items
   ============================================================ */
async function loadOverview() {
  const s = await api('/api/status');
  if (!s) return;

  let html = '<div class="panel-title">Current Focus</div><ul class="panel-list">';
  if (s.focus && s.focus.length) {
    html += s.focus.map(f => {
      const name = typeof f === 'string' ? f : (f.name || '');
      const detail = typeof f === 'object' && f.detail ? f.detail : '';
      return `<li><span class="name">${esc(name)}</span>${detail ? ' - ' + esc(detail.slice(0,200)) : ''}</li>`;
    }).join('');
  } else {
    html += '<li class="empty">no focus set</li>';
  }
  html += '</ul>';

  if (s.action_items && s.action_items.length) {
    html += '<div class="panel-title" style="margin-top:var(--phi4)">Needs Attention</div><ul class="panel-list">';
    html += s.action_items.map(a =>
      `<li class="${a.urgent ? 'urgent' : ''}"><span class="name">${esc(a.name)}</span> - ${esc((a.detail||'').slice(0,150))}</li>`
    ).join('');
    html += '</ul>';
  }

  html += `<div style="margin-top:var(--phi4);font-size:10px;color:var(--bone-30)">
    ${s.pending_tasks || 0} pending / ${s.running_tasks || 0} running
  </div>`;

  $('#ovFocus').innerHTML = html;
}

/* ============================================================
   VIEW DISPATCH
   ============================================================ */
async function loadView(v) {
  switch(v) {
    case 'overview': loadOverview(); loadHealth(); break;
    case 'tasks': loadTasks(); break;
    case 'files': loadFiles('.'); break;
    case 'jobs': loadJobs(); break;
    case 'history': loadHistory(); break;
    case 'log': loadLogDates(); break;
  }
}

/* ============================================================
   TASKS (interactive)
   ============================================================ */
function taskItem(name, status, type, detail) {
  const markerClass = status === 'done' ? 'done' : status === 'active' || status === 'running' ? 'active' : '';
  const itemClass = status === 'done' ? 'done' : '';
  return `<div class="task-item ${itemClass}" data-name="${esc(name)}" data-status="${status}" data-type="${type}">
    <div class="task-marker ${markerClass}" title="toggle status"></div>
    <div class="task-body" style="flex:1">
      <div class="task-text" contenteditable="true">${esc(name)}</div>
      ${detail ? '<div class="task-detail">' + esc(detail.slice(0,200)) + '</div>' : ''}
    </div>
    <span class="task-del" title="delete">x</span>
  </div>`;
}

async function loadTasks() {
  const [d, todos] = await Promise.all([api('/api/tasks'), api('/api/todos').catch(() => null)]);
  if (!d) { $('#tasksContent').innerHTML = '<div class="empty">unable to load tasks</div>'; return; }

  let html = '';

  if (todos && todos.active && todos.active.length) {
    html += '<div class="task-section"><div class="section-label">Session Tasks (TodoWrite)</div>';
    html += todos.active.map(t => {
      const status = t.status === 'completed' ? 'done' : t.status === 'in_progress' ? 'active' : 'pending';
      return taskItem(t.content || '', status, 'session', '');
    }).join('');
    html += '</div>';
  }

  if (d.focus && d.focus.length) {
    html += '<div class="task-section"><div class="section-label">Current Focus</div>';
    html += d.focus.map(t => {
      const name = typeof t === 'string' ? t : (t.name || '');
      const detail = typeof t === 'object' && t.detail ? t.detail : '';
      return taskItem(name, 'active', 'focus', detail);
    }).join('');
    html += '</div>';
  }

  html += '<div class="task-section"><div class="section-label">Dynamic Tasks</div>';
  if (d.dynamic && d.dynamic.length) {
    html += d.dynamic.map(t => {
      if (typeof t === 'string') {
        const status = t.startsWith('[x]') ? 'done' : t.startsWith('[~]') ? 'active' : 'pending';
        return taskItem(t.replace(/^\[.\]\s*/, ''), status, 'dynamic');
      }
      const status = t.status === 'done' ? 'done' : t.status === 'active' || t.status === 'running' ? 'active' : 'pending';
      return taskItem(t.name || '', status, 'dynamic', t.detail || '');
    }).join('');
  }
  html += `<div class="add-task">
    <input type="text" id="addTaskInput" placeholder="add a task...">
    <button onclick="addTask()">Add</button>
  </div></div>`;

  if (!html) html = '<div class="empty">no tasks</div>';
  $('#tasksContent').innerHTML = html;
  bindTaskHandlers();
}

function bindTaskHandlers() {
  // Toggle status
  $$('.task-marker').forEach(m => {
    m.addEventListener('click', async () => {
      const item = m.closest('.task-item');
      const name = item.querySelector('.task-text').textContent.trim();
      const isDone = item.classList.contains('done');
      const action = isDone ? 'Mark as not done' : 'Mark as done';
      item.classList.toggle('done');
      m.classList.toggle('done');
      m.classList.remove('active');
      await sendToKai(`${action} in TASKS.md: "${name}"`);
      setTimeout(loadTasks, 3000);
    });
  });

  // Inline edit
  $$('.task-text[contenteditable]').forEach(el => {
    const original = el.textContent.trim();
    el.addEventListener('focus', () => { el._orig = el.textContent.trim(); });
    el.addEventListener('blur', async () => {
      const newText = el.textContent.trim();
      if (newText && newText !== el._orig) {
        await sendToKai(`Update task in TASKS.md: change "${el._orig}" to "${newText}"`);
        setTimeout(loadTasks, 3000);
      }
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
      if (e.key === 'Escape') { el.textContent = el._orig; el.blur(); }
    });
  });

  // Delete
  $$('.task-del').forEach(btn => {
    btn.addEventListener('click', async () => {
      const item = btn.closest('.task-item');
      const name = item.querySelector('.task-text').textContent.trim();
      item.style.opacity = '0';
      setTimeout(() => item.remove(), 300);
      await sendToKai(`Remove task from TASKS.md: "${name}"`);
    });
  });

  // Add task enter key
  const addInput = $('#addTaskInput');
  if (addInput) {
    addInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });
  }
}

async function addTask() {
  const input = $('#addTaskInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Optimistic: add to UI
  const section = input.closest('.task-section');
  const addDiv = section.querySelector('.add-task');
  addDiv.insertAdjacentHTML('beforebegin', taskItem(text, 'pending', 'dynamic', ''));
  bindTaskHandlers();

  await sendToKai(`Add dynamic task to TASKS.md: "${text}"`);
}

/* ============================================================
   FILES
   ============================================================ */
let currentFilePath = '.';

async function loadFiles(path) {
  currentFilePath = path;
  const d = await api('/api/files?path=' + encodeURIComponent(path));
  if (!d) { $('#fileTree').innerHTML = '<div class="empty">failed to load</div>'; return; }

  // Breadcrumb
  const parts = d.path === '.' ? ['workspace'] : ['workspace', ...d.path.split('/')];
  let crumbHtml = '<div class="breadcrumb">';
  parts.forEach((p, i) => {
    const isLast = i === parts.length - 1;
    const crumbPath = i === 0 ? '.' : parts.slice(1, i + 1).join('/');
    if (isLast) {
      crumbHtml += `<span class="current">${esc(p)}/</span>`;
    } else {
      crumbHtml += `<span onclick="loadFiles('${crumbPath}')">${esc(p)}/</span>`;
    }
  });
  crumbHtml += '</div>';

  // Entries
  let entriesHtml = '';
  if (d.path !== '.') {
    const parent = d.path.includes('/') ? d.path.split('/').slice(0, -1).join('/') : '.';
    entriesHtml += `<div class="file-entry" onclick="loadFiles('${parent}')"><span class="icon">..</span><span>../</span></div>`;
  }

  d.entries.forEach(e => {
    if (e.type === 'dir') {
      const dirPath = d.path === '.' ? e.name : d.path + '/' + e.name;
      entriesHtml += `<div class="file-entry" onclick="loadFiles('${dirPath}')"><span class="icon">+</span><span>${esc(e.name)}/</span></div>`;
    } else {
      const filePath = d.path === '.' ? e.name : d.path + '/' + e.name;
      const size = e.size > 1024 ? (e.size / 1024).toFixed(0) + 'K' : e.size + 'B';
      entriesHtml += `<div class="file-entry" onclick="loadFile('${filePath}')" data-path="${filePath}">
        <span class="icon">-</span><span>${esc(e.name)}</span><span class="size">${size}</span>
      </div>`;
    }
  });

  $('#fileTree').innerHTML = crumbHtml + entriesHtml;
}

async function loadFile(path) {
  // Highlight active
  $$('.file-entry').forEach(e => e.classList.remove('active'));
  const active = $(`.file-entry[data-path="${path}"]`);
  if (active) active.classList.add('active');

  const d = await api('/api/file?path=' + encodeURIComponent(path));
  if (!d) {
    $('#fileContent').innerHTML = '<div class="empty">could not read file</div>';
    return;
  }

  $('#fileContent').innerHTML = `<div class="file-header">${esc(d.name)} (${(d.size/1024).toFixed(1)}K)</div>${esc(d.content)}`;
}

/* ============================================================
   JOBS
   ============================================================ */
async function loadJobs() {
  const d = await api('/api/jobs');
  if (!d || !Array.isArray(d)) { $('#jobsContent').innerHTML = '<div class="empty">no jobs</div>'; return; }
  if (d.length === 0) { $('#jobsContent').innerHTML = '<div class="empty">no scheduled jobs</div>'; return; }

  const active = d.filter(j => j.active !== false);
  $('#jobsContent').innerHTML = active.map(j =>
    `<div class="job-item">
      <span class="job-id">#${j.id || '?'}</span>
      <span class="job-name">${esc(j.name || j.prompt || '?')}</span>
      <span class="job-type">${esc(j.job_type || 'reminder')}</span>
      <span class="job-sched">${esc(j.schedule_type || '')} ${esc(j.schedule_data || '')}</span>
    </div>`
  ).join('') || '<div class="empty">no active jobs</div>';
}

/* ============================================================
   HISTORY
   ============================================================ */
async function loadHistory() {
  const q = ($('#historySearch') || {}).value || '';
  const d = await api('/api/conversations?limit=200' + (q ? '&q=' + encodeURIComponent(q) : ''));
  if (!d) { $('#historyContent').innerHTML = '<div class="empty">no history</div>'; return; }

  if (!d.messages || !d.messages.length) {
    $('#historyContent').innerHTML = '<div class="empty">no matching conversations</div>';
    return;
  }

  $('#historyContent').innerHTML = d.messages.slice(0, 100).map(m =>
    `<div class="conv-item">
      <span class="conv-ts">${m.ts ? new Date(m.ts).toLocaleString() : ''}</span>
      <span class="conv-dir">${m.dir === 'in' ? 'IDAM' : 'KAI'}</span>
      <div class="conv-text">${esc((m.text || '').slice(0, 300))}</div>
    </div>`
  ).join('');
}

/* ============================================================
   LOG
   ============================================================ */
async function loadLogDates() {
  const dates = await api('/api/log/dates');
  if (!dates || !dates.length) { $('#logDates').innerHTML = ''; $('#logContent').innerHTML = '<div class="empty">no logs</div>'; return; }

  $('#logDates').innerHTML = dates.slice(0, 14).map((d, i) =>
    `<button class="log-date-btn${i === 0 ? ' active' : ''}" onclick="loadLogForDate('${d}', this)">${d}</button>`
  ).join('');

  loadLogForDate(dates[0]);
}

async function loadLogForDate(date, btn) {
  if (btn) {
    $$('.log-date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const d = await api('/api/log/' + date);
  if (!d || !d.entries || !d.entries.length) {
    $('#logContent').innerHTML = '<div class="empty">no entries for ' + date + '</div>';
    return;
  }
  $('#logContent').innerHTML = d.entries.map(e =>
    `<div class="log-entry">
      <span class="le-time">${esc(e.time)}</span>
      <span class="le-cat">${esc(e.category)}</span>
      <div class="le-text">${esc(e.text)}</div>
    </div>`
  ).join('');
}

/* ============================================================
   MESSAGE BAR
   ============================================================ */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  await sendToKai(text);
}

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
$('#msgSend').addEventListener('click', sendMessage);

/* ============================================================
   STREAM FILTERS
   ============================================================ */
$$('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === 'all') {
      activeFilters.clear();
      $$('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      $('.filter-btn[data-filter="all"]').classList.remove('active');
      if (activeFilters.has(f)) { activeFilters.delete(f); btn.classList.remove('active'); }
      else { activeFilters.add(f); btn.classList.add('active'); }
      if (activeFilters.size === 0) $('.filter-btn[data-filter="all"]').classList.add('active');
    }
    $$('.ev', fullStream).forEach(el => {
      const type = [...el.classList].find(c => ['tool','text','think','result','msg-in','sys'].includes(c));
      el.classList.toggle('filtered', isFiltered(type));
    });
  });
});

/* ============================================================
   SEARCH DEBOUNCE
   ============================================================ */
let searchTimer = null;
$('#historySearch').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadHistory, 400);
});

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  const hist = await api('/history');
  if (hist && Array.isArray(hist)) {
    hist.forEach(ev => appendEvent(ev));
    overviewStream.scrollTop = 0;
    fullStream.scrollTop = 0;
  }

  connectSSE();
  loadHealth();
  loadOverview();

  setInterval(loadHealth, 10000);
  setInterval(() => {
    if (S.view === 'overview') loadOverview();
    if (S.view === 'tasks') loadTasks();
  }, 15000);
}

init();
